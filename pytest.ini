[pytest]
qt_api = pyqt6
asyncio_mode = auto

# Ensure project root is on sys.path so BlocksScreen.lib.network resolves
pythonpath = .

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests with mocked dependencies (fast)
    integration: Integration tests using real D-Bus/NetworkManager (slow)
    requires_nm: Requires NetworkManager to be running
    requires_wifi: Requires a Wi-Fi device
    modifies_network: May temporarily modify network configuration

# Default: run unit tests only (skip integration)
addopts = -m "not integration" --tb=short -q

# Timeout
timeout = 30

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:coroutine '_noop_coro' was never awaited:RuntimeWarning